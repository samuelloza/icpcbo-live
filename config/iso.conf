#!/usr/bin/env bash

# Build identity
ISO_NAME="${ISO_NAME:-icpc-bolivia-debian}"
ARCH="${ARCH:-amd64}"

# Base system
DEBIAN_SUITE="${DEBIAN_SUITE:-trixie}"
DEBIAN_MIRROR="${DEBIAN_MIRROR:-http://deb.debian.org/debian}"
DEBIAN_SECURITY_MIRROR="${DEBIAN_SECURITY_MIRROR:-http://security.debian.org/debian-security}"
DEBIAN_COMPONENTS="${DEBIAN_COMPONENTS:-main contrib non-free non-free-firmware}"

# Branding
META_DISTRO_ID="${META_DISTRO_ID:-icpc-bolivia-debian}"
META_DISTRO_NAME="${META_DISTRO_NAME:-ICPC Bolivia Debian}"
META_DISTRO_VERSION="${META_DISTRO_VERSION:-13}"

# Paths
OUTPUT_DIR="${OUTPUT_DIR:-/work/output}"
UPDATES_DIR="${UPDATES_DIR:-/work/updates}"
WORK_DIR="${WORK_DIR:-/tmp/icpc-bolivia-iso-work}"
ROOTFS_DIR="${ROOTFS_DIR:-${WORK_DIR}/rootfs}"
RUNTIME_DIR="${RUNTIME_DIR:-${WORK_DIR}/runtime}"
ISO_STAGING_DIR="${ISO_STAGING_DIR:-${WORK_DIR}/iso-staging}"

# Runtime folder found by initramfs and GRUB
CONTEST_DIR="${CONTEST_DIR:-icpc_bo}"
ROOT_SQUASH_NAME="${ROOT_SQUASH_NAME:-filesystem.squashfs}"

# Full installer bootstrap configuration
FULL_INSTALL_URL="${FULL_INSTALL_URL:-}"
FULL_INSTALL_SHA256="${FULL_INSTALL_SHA256:-}"
UPDATE_MANIFEST_URL="${UPDATE_MANIFEST_URL:-}"
UPDATE_CHECK_ON_BOOT="${UPDATE_CHECK_ON_BOOT:-true}"
RUNTIME_VERSION="${RUNTIME_VERSION:-dev}"

# System defaults
HOSTNAME="${HOSTNAME:-contest}"
LOCALE="${LOCALE:-en_US.UTF-8}"
TIMEZONE="${TIMEZONE:-UTC}"
DEFAULT_USER="${DEFAULT_USER:-icpc}"
DEFAULT_PASSWORD="${DEFAULT_PASSWORD:-icpc}"
ENABLE_AUTOLOGIN="${ENABLE_AUTOLOGIN:-true}"
DEFAULT_BROWSER_URL="${DEFAULT_BROWSER_URL:-file:///usr/share/doc/icpcbo/index.html}"
GNOME_INPUT_SOURCES="${GNOME_INPUT_SOURCES:-[('xkb', 'latam'), ('xkb', 'us')]}"
MIN_RAM_MB="${MIN_RAM_MB:-4096}"

# Keyboard layout (X11/GNOME + console)
# Use 'latam' for Spanish Latin American, 'es' for Spain, 'us' for US, etc.
KEYBOARD_LAYOUT="${KEYBOARD_LAYOUT:-latam}"

# Optional proxy
APT_PROXY="${APT_PROXY:-}"
